<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link rel="stylesheet" href="css/styles.css">

    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(
                135deg,
                #8db9e8,
                #ffffff
            );
        }

        .register-card {
            width: 400px;
            max-width: 90%;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .register-card h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #5d91cb;
        }

        .register-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .register-card button {
            width: 100%;
            padding: 12px;
            background: #5d91cb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-card button:hover {
            background: #4a7db4;
        }

        .register-card p {
            margin-top: 20px;
            text-align: center;
        }

        .register-card a {
            color: #5d91cb;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            color: red;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            color: green;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="register-container">

    <div class="register-card">

        <h1>Create Account</h1>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <input
            type="text"
            id="profileName"
            placeholder="Profile Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            required
        >

        <button id="registerBtn">
            Create Account
        </button>

        <p>
            Already have an account?
            <a href="login.html">Sign In</a>
        </p>

    </div>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
