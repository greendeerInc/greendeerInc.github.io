<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DukeLink Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-glow"></div>

    <header class="topbar">
        <div class="logo-section">
            <h1>DukeLink</h1>
            <span>Connected Campus</span>
        </div>

        <div class="user-info">
            <span id="currentUserName">Loading...</span>
        </div>
    </header>

    <main class="dashboard-container">

        <section class="dashboard-header">
            <h2>Your Network</h2>
            <p>See what everyone is doing right now.</p>
        </section>

        <section id="usersGrid" class="users-grid">

            <div class="loading-card">
                Loading users...
            </div>

        </section>

    </main>

    <script type="module" src="js/dashboard.js"></script>

</body>
</html>
