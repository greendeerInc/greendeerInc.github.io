<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile | DukeLink</title>

    <link rel="stylesheet" href="css/profile.css">
    

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">


</head>
<body>

    <div class="background-glow"></div>

    <header class="topbar">
        <div class="logo-section">
            <h1>DukeLink</h1>
            <span>Connected Campus</span>
        </div>

        <div class="user-info">
            <span id="currentUserName">Loading...</span>
        </div>
    </header>

    <main class="dashboard-container">

        <main class="main-content">

            <div class="profile-card">

                <h1>Edit Profile</h1>

                <h3>Select Avatar</h3>

                <div class="profile-card">

                    <img id="currentAvatar" class="current-avatar" src="avatars/1.png">

                    <div id="avatarGrid"></div>

                </div>

                <input id="profileName" placeholder="Profile Name">

                <button id="saveProfileBtn">
                    Save Profile
                </button>

            </div>

        </main>

    </main>

    <link rel="stylesheet" href="css/footer.css">
    <footer class="app-footer">

        <a href="info.html" class="footer-item">
            <i class="fa-solid fa-circle-info"></i>
            <span>Info</span>
        </a>

        <a href="study.html" class="footer-item">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Study</span>
        </a>

        <a href="dashboard.html" class="footer-item footer-home">
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="locations.html" class="footer-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Map</span>
        </a>

        <a href="profile.html" class="footer-item">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </a>

    </footer>

    <script src="https://unpkg.com/ical.js/build/ical.min.js"></script>

    <script type="module" src="js/profile.js"></script>

    <script src="js/footer.js"></script>

</body>
</html>
