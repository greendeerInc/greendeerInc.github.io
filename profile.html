<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav id="sidebar" class="sidebar">

        <div class="sidebar-header">

            <button
                id="sidebarToggle"
                class="sidebar-toggle">

                ☰

            </button>

            <span class="sidebar-title">
                Duke Portal
            </span>

        </div>

        <div class="sidebar-content">

            <a
                href="dashboard.html"
                class="sidebar-link"
                data-page="dashboard">

                <span class="icon">🏠</span>

                <span class="label">
                    Dashboard
                </span>

            </a>

            <a
                href="profile.html"
                class="sidebar-link"
                data-page="profile">

                <span class="icon">👤</span>

                <span class="label">
                    Profile
                </span>

            </a>

            <a
                href="locations.html"
                class="sidebar-link"
                data-page="locations">

                <span class="icon">📄</span>

                <span class="label">
                    Locations
                </span>

            </a>

            <a
                href="page2.html"
                class="sidebar-link"
                data-page="page2">

                <span class="icon">⚙️</span>

                <span class="label">
                    Page 2
                </span>

            </a>

        </div>

        <div class="sidebar-footer">

            <button
                id="logoutBtn"
                class="logout-btn">

                Logout

            </button>

        </div>

</nav>

<div class="container">

    <main class="main-content">

        <div class="card">

            <h1>Edit Profile</h1>

        </div>

        <div class="profile-card">

            <h1>My Profile</h1>

            <h3>Select Avatar</h3>

            <div class="profile-card">

                <img
                    id="currentAvatar"
                    class="current-avatar"
                    src="avatars/1.png"
                >

                <div id="avatarGrid"></div>

            </div>

            <input
                id="profileName"
                placeholder="Profile Name">

            <textarea
                id="status"
                maxlength="120"
                placeholder="Status">
            </textarea>

            <button id="saveProfileBtn">
                Save Profile
            </button>

        </div>

    </main>

</div>

<script type="module"
        src="js/sidebar.js">
</script>

<script type="module" src="js/profile.js"></script>

<script type="module">
    import { protectPage } from "./js/auth.js";
    protectPage();
</script>

<script type="module" src="js/app.js"></script>

</body>
</html>
