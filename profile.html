<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

    <div class="user-profile">

        <div id="profileDisplay">
            Loading...
        </div>

    </div>

    <aside id="sidebar" class="sidebar">

        <div class="logo">
            Duke Portal
        </div>

        <ul class="nav-links">
    <li>
        <a href="dashboard.html">
            🏠 <span class="nav-text">Dashboard</span>
        </a>
    </li>

    <li>
        <a href="page1.html">
            📄 <span class="nav-text">Page 1</span>
        </a>
    </li>

    <li>
        <a href="page2.html">
            ⚙️ <span class="nav-text">Page 2</span>
        </a>
    </li>
</ul>

    </aside>

    <main class="main-content">

        <div class="topbar">

            <button
                id="menuBtn"
                class="menu-btn">
                ☰
            </button>

            <button
                onclick="logout()"
                class="menu-btn">
                Logout
            </button>

        </div>

        <div class="card">

            <h1>Dashboard</h1>

            <br>

            <button
                onclick="saveSampleData()"
                class="menu-btn">
                Save Firestore Data
            </button>

        </div>

        <div class="profile-card">

            <h1>My Profile</h1>

            <img
                id="currentAvatar"
                class="profile-avatar"
                src="avatars/1.png"
            >

            <h3>Select Avatar</h3>

            <div id="avatarGrid"></div>

            <input
                id="profileName"
                placeholder="Profile Name">

            <textarea
                id="status"
                maxlength="120"
                placeholder="Status">
            </textarea>

            <button id="saveProfileBtn">
                Save Profile
            </button>

        </div>

    </main>

</div>

<script type="module" src="js/profile.js"></script>

<script type="module">
    import { protectPage } from "./js/auth.js";
    protectPage();
</script>

<script type="module" src="js/app.js"></script>

</body>
</html>
